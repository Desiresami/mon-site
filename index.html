<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes réseaux</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
    height: 100vh;

    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #000);
    background-size: 400% 400%;
    animation: bgMove 12s ease infinite;
}

/* ANIMATION FOND */
@keyframes bgMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* PARTICULES */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: float 10s linear infinite;
    z-index: 1;
}

@keyframes float {
    0% {transform: translateY(100vh) scale(0);}
    100% {transform: translateY(-10vh) scale(1);}
}

/* CONTENU */
.container {
    position: relative;
    z-index: 2;
    margin-top: 60px;
    padding: 20px;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 24px;
    margin-bottom: 30px;
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

/* BOUTONS */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;

    margin: 12px auto;
    padding: 15px;
    width: 90%;
    max-width: 340px;

    border-radius: 16px;
    text-decoration: none;
    font-size: 16px;
    color: white;

    backdrop-filter: blur(12px);
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
}

/* GLOW HOVER */
.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(255,255,255,0.4);
}

/* COULEURS */
.contact { background: linear-gradient(45deg, #667eea, #764ba2); }
.call { background: linear-gradient(45deg, #11998e, #38ef7d); }
.instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
.tiktok { background: linear-gradient(45deg, #000, #25F4EE, #FE2C55); }

/* ICONES */
.icon {
    font-size: 18px;
}

/* ROLLERS */
.roller {
    position: absolute;
    font-size: 28px;
    opacity: 0.5;
    z-index: 1;
    animation: roll linear infinite;
    filter: blur(0.3px);
}

.r1 { top: 20%; animation-duration: 10s; }
.r2 { top: 45%; animation-duration: 14s; font-size: 34px; }
.r3 { top: 70%; animation-duration: 18s; }
.r4 { top: 35%; animation-duration: 22s; }

@keyframes roll {
    0% {transform: translateX(-10%) rotate(0deg);}
    100% {transform: translateX(110vw) rotate(720deg);}
}

/* MOBILE */
@media (max-width: 480px) {
    h1 { font-size: 20px; }
    .btn { font-size: 15px; }
}
</style>
</head>

<body>

<!-- PARTICULES -->
<script>
for (let i = 0; i < 25; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (5 + Math.random() * 10) + "s";
    document.body.appendChild(p);
}
</script>

<!-- ROLLERS -->
<div class="roller r1">🛼</div>
<div class="roller r2">🛼</div>
<div class="roller r3">🛼</div>
<div class="roller r4">🛼</div>

<div class="container">

    <h1>comment me joindre :)</h1>

    <a class="btn contact" href="#" onclick="openVCard()">
        <span class="icon">👤</span> Ajouter contact
    </a>

    <a class="btn call" href="tel:+241074233986">
        <span class="icon">📞</span> Appeler
    </a>

    <a class="btn instagram" href="https://www.instagram.com/goatname.sterben/" target="_blank">
        <span class="icon">📸</span> Instagram
    </a>

    <a class="btn tiktok" href="https://www.tiktok.com/@samskating0" target="_blank">
        <span class="icon">🎵</span> TikTok
    </a>

</div>

<script>
function openVCard() {
    const vcard = `
BEGIN:VCARD
VERSION:3.0
FN:sterben
ORG:sam
TEL;TYPE=CELL:+241074233986
URL:https://www.instagram.com/goatname.sterben/
URL:https://www.tiktok.com/@samskating0
END:VCARD

    const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
    const url = URL.createObjectURL(blob);

</script>

</body>
</html>
